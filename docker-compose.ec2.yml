# =============================================================================
# StadiumOS AI — AWS EC2 Production Orchestration Compose (Excluding Frontend)
# =============================================================================
# Coordinates Redis database cache, Express gateway, and LangGraph agent mesh on EC2.
# PostgreSQL database is hosted externally via Supabase.
# Frontend command-center dashboard is deployed externally via Vercel.
# =============================================================================

version: '3.8'

services:
  # 1. Redis 7 — Cache & Spatial Index
  redis:
    image: redis:7-alpine
    container_name: stadiumos-redis-prod
    restart: unless-stopped
    command: redis-server --save 60 1 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 2. Express API Gateway Service
  api:
    build:
      context: ./apps/backend-gateway
      dockerfile: Dockerfile
    container_name: stadiumos-api-prod
    restart: unless-stopped
    ports:
      # Bind to localhost ONLY to block raw port access bypass of Nginx
      - "127.0.0.1:8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AGENT_MESH_URL: http://agent-mesh:8001/api/v1/agents
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      LOG_LEVEL: info
      LOG_FORMAT: json
    depends_on:
      redis:
        condition: service_healthy

  # 3. LangGraph Agent Mesh Service
  agent-mesh:
    build:
      context: ./apps/agent-mesh
      dockerfile: Dockerfile
    container_name: stadiumos-agent-mesh-prod
    restart: unless-stopped
    environment:
      PORT: 8001
      BACKEND_API_URL: http://api:8000/api/v1
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_prod_data:
    driver: local

# =============================================================================
# StadiumOS AI — Nginx Reverse Proxy Configuration
# =============================================================================
# Directs HTTP/HTTPS traffic to the Express API Gateway, manages WebSockets
# upgrade handshakes, and handles SSL encryption/decryption boundaries.
# =============================================================================

# HTTP Server Block — Redirects all insecure traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.stadiumos.com; # Replace with your custom domain name or EC2 elastic IP

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block — Secure Reverse Proxy Gateway
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.stadiumos.com; # Replace with your custom domain name or EC2 elastic IP

    # Let's Encrypt SSL Certificates (Managed & auto-injected by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.stadiumos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stadiumos.com/privkey.pem;

    # SSL Security Parameter Defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # 1. Proxy Rules for Express REST endpoints
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Identity forwarding headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer configuration for large telemetry updates
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }

    # 2. Proxy Rules for WebSocket Connections (/ws)
    # Crucial for live digital twin telemetry feed synchronization.
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Upgrade handshake headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable timeouts for long-running persistent socket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

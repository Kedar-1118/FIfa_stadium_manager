# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for local time
# timezone =

# max length of characters to include in generate-name
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported
# relative to the change directory
# prepend_sys_path = false

# version path separator; as of Alembic 1.3, this can be ','
# to associate multiple version paths.
# version_path_separator = :

# set to 'true' to search source files recursively for
# revision scripts; only available with two-step revision layout
# recursive_version_locations = false

# the database URL is injected dynamically in env.py from settings,
# so we do not hardcode it here.
sqlalchemy.url = postgresql+asyncpg://stadiumos:stadiumos_secret@localhost:5432/stadiumos_db

[post_write_hooks]
# post_write_hooks defines scripts or cleanup tools to run after
# a revision is generated. We can use ruff to format the output.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
